<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>拓扑可视工具</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <h1 data-i18n="appTitle">拓扑可视工具</h1>
        <span data-i18n="appSubtitle">CSV / XLSX 上传，GIS 与逻辑拓扑联动</span>
      </div>
      <div class="top-actions">
        <div class="segmented compact" aria-label="Language">
          <button id="langZhBtn" class="active" type="button">中文</button>
          <button id="langEnBtn" type="button">English</button>
        </div>
        <nav class="tabs" aria-label="主页面切换">
          <button id="tabTopo" class="active" type="button" data-i18n="tabTopo">拓扑视图</button>
          <button id="tabData" type="button" data-i18n="tabData">数据管理</button>
        </nav>
      </div>
    </header>

    <div id="topoPage" class="main topo-page">
      <aside class="sidebar">
        <section class="section">
          <h2 data-i18n="sectionUpload">数据上传</h2>
          <div class="form-grid">
            <label class="file-line">
              <span data-i18n="deviceTable">网元表</span>
              <input id="neFile" type="file" accept=".csv,.xlsx,.xls">
            </label>
            <label class="file-line">
              <span data-i18n="linkTable">链路表</span>
              <input id="linkFile" type="file" accept=".csv,.xlsx,.xls">
            </label>
            <div class="row">
              <button id="loadFilesBtn" class="primary grow" type="button" data-i18n="parseUpload">解析上传数据</button>
              <button id="mockBtn" type="button" data-i18n="loadMock">加载 Mock</button>
            </div>
            <div id="uploadMessage" class="message" data-i18n="requiredFields">必选字段：NE Name、Role、Longitude、Latitude、Src NE Name、Sink NE Name。</div>
          </div>
        </section>

        <section class="section">
          <h2 data-i18n="sectionStats">统计</h2>
          <div class="stats">
            <div class="stat"><b id="statNodes">0</b><span data-i18n="devices">网元</span></div>
            <div class="stat"><b id="statLinks">0</b><span data-i18n="links">链路</span></div>
            <div class="stat"><b id="statVisibleNodes">0</b><span data-i18n="visibleDevices">当前显示网元</span></div>
            <div class="stat"><b id="statVisibleLinks">0</b><span data-i18n="visibleLinks">当前显示链路</span></div>
          </div>
        </section>

        <section class="section">
          <h2 data-i18n="sectionLegend">节点图例</h2>
          <div id="nodeLegend" class="legend"></div>
        </section>

        <section class="section">
          <h2 data-i18n="sectionStyle">样式设置</h2>
          <div class="style-config">
            <div class="style-group">
              <div class="style-title" data-i18n="roleStyle">角色图例样式</div>
              <div id="roleStyleEditor" class="role-style-editor"></div>
            </div>
            <div class="style-group">
              <div class="style-title" data-i18n="nodeStyleRules">节点样式规则</div>
              <div id="nodeStyleRuleList" class="node-style-rule-list"></div>
              <div class="row">
                <button id="addNodeStyleRuleBtn" class="grow" type="button" data-i18n="addNodeStyleRule">新增节点规则</button>
                <button id="applyNodeStyleRulesBtn" class="primary grow" type="button" data-i18n="applyNodeStyleRules">应用节点规则</button>
              </div>
              <datalist id="nodeStyleValueSuggestions"></datalist>
            </div>
            <div class="style-group">
              <div class="style-title" data-i18n="linkStyleRules">链路样式规则</div>
              <div id="linkStyleRuleList" class="link-style-rule-list"></div>
              <div class="row">
                <button id="addLinkStyleRuleBtn" class="grow" type="button" data-i18n="addLinkStyleRule">新增链路规则</button>
                <button id="applyLinkStyleRulesBtn" class="primary grow" type="button" data-i18n="applyLinkStyleRules">应用链路规则</button>
              </div>
              <datalist id="linkStyleValueSuggestions"></datalist>
            </div>
            <div class="style-group">
              <div class="style-title" data-i18n="routePathStyle">路网路径样式</div>
              <label class="check-row"><input id="routePathVisibleInput" type="checkbox" checked><span data-i18n="showRoutePath">显示路网路径</span></label>
              <div class="style-row route-style-row">
                <label><span data-i18n="styleColor">颜色</span><input id="routePathColorInput" type="color"></label>
                <label><span data-i18n="linkRuleWidth">线宽</span><select id="routePathWidthSelect"></select></label>
                <label><span data-i18n="linkRuleLineStyle">线型</span><select id="routePathLineStyleSelect"></select></label>
                <label><span data-i18n="routePathOpacity">透明度</span><input id="routePathOpacityInput" type="range" min="0.1" max="1" step="0.05"></label>
              </div>
            </div>
            <button id="resetStyleBtn" type="button" data-i18n="resetStyle">重置样式</button>
          </div>
        </section>

        <section class="section">
          <h2 data-i18n="sectionLocate">网元定位</h2>
          <div class="form-grid">
            <input id="searchInput" list="neSuggestions" placeholder="输入网元名称" data-i18n-placeholder="searchPlaceholder">
            <datalist id="neSuggestions"></datalist>
            <button id="locateBtn" class="primary" type="button" data-i18n="locateDevice">定位网元</button>
            <div id="locateMessage" class="message"></div>
          </div>
        </section>

        <section class="section">
          <h2 data-i18n="sectionHighlight">高亮条件</h2>
          <div class="form-grid">
            <div class="row">
              <select id="highlightField" class="grow"></select>
              <select id="highlightOp" style="width: 92px"></select>
            </div>
            <input id="highlightValue" list="highlightHistory" placeholder="条件值" data-i18n-placeholder="conditionValue">
            <datalist id="highlightHistory"></datalist>
            <div class="row">
              <button id="applyHighlightBtn" class="primary grow" type="button" data-i18n="applyHighlight">应用高亮</button>
              <button id="advancedHighlightBtn" type="button" data-i18n="advancedCondition">复合条件</button>
              <button id="clearHighlightBtn" type="button" data-i18n="clear">清除</button>
            </div>
            <label class="range-line"><span data-i18n="highlightContrast">对比度</span><input id="highlightContrastInput" type="range" min="0" max="1" step="0.05"></label>
            <div id="highlightRuleSummary" class="condition-summary"></div>
          </div>
        </section>

        <section class="section">
          <h2 data-i18n="sectionFilter">过滤条件</h2>
          <div class="form-grid">
            <div class="row">
              <select id="filterField" class="grow"></select>
              <select id="filterOp" style="width: 92px"></select>
            </div>
            <input id="filterValue" list="filterHistory" placeholder="条件值" data-i18n-placeholder="conditionValue">
            <datalist id="filterHistory"></datalist>
            <div class="row">
              <button id="applyFilterBtn" class="primary grow" type="button" data-i18n="applyFilter">应用过滤</button>
              <button id="advancedFilterBtn" type="button" data-i18n="advancedCondition">复合条件</button>
              <button id="clearFilterBtn" type="button" data-i18n="clear">清除</button>
            </div>
            <div id="filterRuleSummary" class="condition-summary"></div>
          </div>
        </section>

        <section class="section">
          <h2 data-i18n="sectionBulkQuery">批量查询</h2>
          <div class="form-grid">
            <textarea id="bulkQueryInput" class="bulk-query" data-i18n-placeholder="bulkQueryPlaceholder" placeholder="从 Word / Excel / CSV 粘贴网元或链路清单"></textarea>
            <div class="row">
              <button id="applyBulkQueryBtn" class="primary grow" type="button" data-i18n="query">查询</button>
              <button id="clearBulkQueryBtn" type="button" data-i18n="clearQuery">清除查询</button>
            </div>
            <div id="bulkQueryMessage" class="message"></div>
          </div>
        </section>
      </aside>

      <main class="workspace">
        <div class="toolbar">
          <div class="left">
            <div class="segmented" aria-label="拓扑视图切换">
              <button id="gisBtn" class="active" type="button">GIS Topo</button>
              <button id="logicBtn" type="button">Logic Topo</button>
            </div>
            <button id="fitBtn" type="button" data-i18n="fitView">适配视图</button>
          </div>
          <div class="right">
            <span id="viewMessage" class="notice" data-i18n="waitUpload">等待上传数据。</span>
          </div>
        </div>
        <div class="canvas-wrap">
          <div id="map"></div>
          <svg id="logicCanvas" class="hidden" role="img" aria-label="逻辑拓扑画布"></svg>
          <div id="emptyState" class="empty" data-i18n="emptyState">上传网元表和链路表，或点击“加载 Mock”开始查看拓扑。</div>
        </div>
        <div id="details" class="details"></div>
      </main>
    </div>

    <div id="dataPage" class="data-page">
      <div class="data-toolbar">
        <div class="left">
          <div class="segmented">
            <button id="neTableBtn" class="active" type="button" data-i18n="deviceTable">网元表</button>
            <button id="linkTableBtn" type="button" data-i18n="linkTable">链路表</button>
          </div>
          <select id="tableField"></select>
          <select id="tableOp"></select>
          <input id="tableValue" placeholder="表格过滤值" data-i18n-placeholder="tableFilterValue">
          <button id="clearTableFilterBtn" type="button" data-i18n="clearFilter">清除过滤</button>
        </div>
        <div class="right">
          <button id="addRowBtn" type="button" data-i18n="addRow">新增行</button>
          <button id="applyEditBtn" class="primary" type="button" data-i18n="applyEdit">应用编辑</button>
        </div>
      </div>
      <div id="dataSummary" class="data-summary"></div>
      <div class="table-wrap">
        <table id="dataTable"></table>
      </div>
    </div>

    <div id="conditionModal" class="condition-modal hidden">
      <div class="condition-card">
        <div class="condition-head">
          <h3 id="conditionModalTitle">复合条件</h3>
          <button id="conditionModalClose" type="button" aria-label="Close">×</button>
        </div>
        <div id="conditionModeGroup" class="condition-mode">
          <label><input type="radio" name="conditionMode" value="all"><span data-i18n="matchAll">全部满足</span></label>
          <label><input type="radio" name="conditionMode" value="any"><span data-i18n="matchAny">任一满足</span></label>
        </div>
        <div id="conditionRuleList" class="condition-rule-list"></div>
        <button id="addConditionRuleBtn" type="button" data-i18n="addCondition">新增条件</button>
        <div class="condition-history">
          <div class="condition-history-title" data-i18n="conditionHistory">历史条件</div>
          <div id="conditionHistoryList" class="condition-history-list"></div>
        </div>
        <div class="condition-actions">
          <button id="applyConditionModalBtn" class="primary grow" type="button" data-i18n="apply">应用</button>
          <button id="cancelConditionModalBtn" type="button" data-i18n="cancel">取消</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
