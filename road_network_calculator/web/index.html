<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Road Network Calculator</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <header>
          <div class="brand-row">
            <div class="brand-icon" aria-hidden="true">
              <span></span><span></span><span></span>
            </div>
            <div class="brand-text">
              <strong>CoNET</strong>
            </div>
          </div>
          <div class="header-row">
            <h1 data-i18n="appTitle">Road Network Calculator</h1>
            <div class="language-toggle" role="group" aria-label="Language">
              <button id="langEnBtn" type="button" data-lang="en">EN</button>
              <button id="langZhBtn" type="button" data-lang="zh">中文</button>
            </div>
          </div>
          <p id="status">Network not loaded</p>
        </header>

        <section class="panel">
          <h2 data-i18n="roadData">Road Data</h2>
          <label class="file-picker">
            <span data-i18n="selectCsv">Select WKT CSV</span>
            <input id="csvFile" type="file" accept=".csv,text/csv" />
          </label>
          <button id="uploadBtn" type="button" data-i18n="uploadLoad">Upload and Load</button>
          <div id="uploadProgress" class="progress-panel hidden">
            <div class="progress-meta">
              <span id="uploadProgressText">Preparing...</span>
              <span id="uploadProgressPercent">0%</span>
            </div>
            <div class="progress-track">
              <div id="uploadProgressBar" class="progress-bar"></div>
            </div>
            <div id="uploadProgressDetail" class="progress-detail"></div>
          </div>
        </section>

        <section class="panel requires-network hidden">
          <h2 data-i18n="networkLayer">Network Layer</h2>
          <label class="check-row">
            <input id="showNetworkLayer" type="checkbox" checked />
            <span data-i18n="showNetwork">Show road network</span>
          </label>
          <div class="grid">
            <label><span data-i18n="lineColor">Line color</span><input id="networkColor" type="color" value="#00c8d7" /></label>
            <label><span data-i18n="lineStyle">Line style</span>
              <select id="networkStyle">
                <option value="solid" data-i18n="solid">Solid</option>
                <option value="dashed" data-i18n="dashed">Dashed</option>
                <option value="dotted" data-i18n="dotted">Dotted</option>
              </select>
            </label>
            <label><span data-i18n="opacity">Opacity</span><input id="networkOpacity" type="range" min="0.1" max="1" step="0.05" value="0.65" /></label>
            <label><span data-i18n="maxLines">Max lines</span><input id="networkLimit" type="number" min="100" max="100000" step="500" value="12000" /></label>
          </div>
          <button id="refreshNetworkBtn" type="button" data-i18n="refreshLayer">Refresh Layer</button>
        </section>

        <section class="panel requires-network hidden">
          <h2 data-i18n="routeCoordinates">Route Coordinates</h2>
          <div class="grid">
            <label><span data-i18n="startLon">Start Lon</span><input id="startLon" type="number" step="0.000001" value="100.501765" /></label>
            <label><span data-i18n="startLat">Start Lat</span><input id="startLat" type="number" step="0.000001" value="13.756331" /></label>
            <label><span data-i18n="endLon">End Lon</span><input id="endLon" type="number" step="0.000001" value="100.534850" /></label>
            <label><span data-i18n="endLat">End Lat</span><input id="endLat" type="number" step="0.000001" value="13.746500" /></label>
          </div>
          <button id="routeBtn" type="button" data-i18n="calculateRoute">Calculate Route</button>
        </section>

        <section class="panel requires-network hidden">
          <h2 data-i18n="batchQuery">Batch Query</h2>
          <textarea id="batchInput" spellcheck="false" placeholder="100.491389 13.75 100.53485 13.7465"></textarea>
          <button id="batchBtn" type="button" data-i18n="runBatch">Run Batch</button>
          <div id="batchResults" class="list"></div>
        </section>

        <section class="panel requires-network hidden">
          <h2 data-i18n="batchFileRouting">Batch Route File</h2>
          <label class="file-picker">
            <span data-i18n="selectPairCsv">Select source-sink CSV</span>
            <input id="batchRouteFile" type="file" accept=".csv,text/csv" />
          </label>
          <div class="grid">
            <label><span data-i18n="thresholdKm">Threshold km</span><input id="batchThresholdKm" type="number" min="0" step="1" value="30" /></label>
            <label><span data-i18n="workers">Workers</span><input id="batchWorkers" type="number" min="1" max="16" step="1" value="4" /></label>
          </div>
          <button id="batchRouteStartBtn" type="button" data-i18n="startBatchRouting">Start Batch Routing</button>
          <div id="batchRouteProgress" class="progress-panel hidden">
            <div class="progress-meta">
              <span id="batchRouteProgressText">Preparing...</span>
              <span id="batchRouteProgressPercent">0%</span>
            </div>
            <div class="progress-track">
              <div id="batchRouteProgressBar" class="progress-bar"></div>
            </div>
            <div id="batchRouteProgressDetail" class="progress-detail"></div>
          </div>
          <button id="batchRouteDownloadBtn" type="button" class="hidden" data-i18n="downloadResult">Download Result CSV</button>
          <div class="grid">
            <label><span data-i18n="searchSrcName">Search Src Name</span><input id="batchPreviewSrc" type="text" /></label>
            <label><span data-i18n="searchSinkName">Search Sink Name</span><input id="batchPreviewSink" type="text" /></label>
          </div>
          <button id="batchPreviewBtn" type="button" class="hidden" data-i18n="searchPreview">Search Preview Routes</button>
          <div id="batchPreviewResults" class="list"></div>
        </section>

        <section class="panel result-panel requires-network hidden">
          <h2 data-i18n="result">Result</h2>
          <dl>
            <dt data-i18n="distance">Distance</dt>
            <dd id="distance">-</dd>
            <dt data-i18n="snapTime">Snap Time</dt>
            <dd id="snapTime">-</dd>
            <dt data-i18n="searchTime">Search Time</dt>
            <dd id="searchTime">-</dd>
            <dt data-i18n="totalTime">Total Time</dt>
            <dd id="totalTime">-</dd>
          </dl>
        </section>

        <section class="panel requires-network hidden">
          <h2 data-i18n="history">History</h2>
          <p class="muted small-text" data-i18n="historyHint">Toggle records to show multiple routes on the map.</p>
          <div id="historyList" class="list"></div>
        </section>
      </aside>
      <section id="map" aria-label="Route map"></section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="/static/app.js"></script>
  </body>
</html>
