<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Road Network Calculator</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"
      crossorigin=""
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <header>
          <h1>Road Network Calculator</h1>
          <p id="status">Network not loaded</p>
        </header>

        <section class="panel">
          <h2>Road Data</h2>
          <label class="file-picker">
            <span>Select WKT CSV</span>
            <input id="csvFile" type="file" accept=".csv,text/csv" />
          </label>
          <button id="uploadBtn" type="button">Upload and Load</button>
        </section>

        <section class="panel">
          <h2>Route Coordinates</h2>
          <div class="grid">
            <label>Start Lon<input id="startLon" type="number" step="0.000001" value="100.501765" /></label>
            <label>Start Lat<input id="startLat" type="number" step="0.000001" value="13.756331" /></label>
            <label>End Lon<input id="endLon" type="number" step="0.000001" value="100.534850" /></label>
            <label>End Lat<input id="endLat" type="number" step="0.000001" value="13.746500" /></label>
          </div>
          <button id="routeBtn" type="button">Calculate Route</button>
        </section>

        <section class="panel result-panel">
          <h2>Result</h2>
          <dl>
            <dt>Distance</dt>
            <dd id="distance">-</dd>
            <dt>Snap Time</dt>
            <dd id="snapTime">-</dd>
            <dt>Search Time</dt>
            <dd id="searchTime">-</dd>
            <dt>Total Time</dt>
            <dd id="totalTime">-</dd>
          </dl>
        </section>
      </aside>
      <section id="map" aria-label="Route map"></section>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"
      crossorigin=""
    ></script>
    <script src="/static/app.js"></script>
  </body>
</html>
